<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bed Mesh Visualizer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.27.0/plotly.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f4f5f7;
    --panel: #ffffff;
    --border: #dde1e9;
    --accent: #2563eb;
    --accent2: #ef4444;
    --text: #1e2330;
    --text-dim: #8a93a8;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 24px 60px;
    gap: 0;
  }

  header {
    width: 100%;
    max-width: 960px;
    margin-bottom: 36px;
    display: flex;
    align-items: baseline;
    gap: 16px;
  }

  header h1 {
    font-family: var(--sans);
    font-weight: 800;
    font-size: 1.6rem;
    letter-spacing: -0.02em;
    color: #1e2330;
  }

  header span {
    font-size: 0.75rem;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .input-section {
    width: 100%;
    max-width: 960px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .label-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  label {
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .btn-row {
    display: flex;
    gap: 10px;
  }

  button {
    font-family: var(--mono);
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 6px 16px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
  }

  button:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  button.primary {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,229,255,0.06);
  }

  button.primary:hover {
    background: rgba(0,229,255,0.14);
  }

  textarea {
    width: 100%;
    height: 180px;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.72rem;
    line-height: 1.6;
    padding: 14px 16px;
    resize: vertical;
    outline: none;
    transition: border-color 0.15s;
  }

  textarea:focus {
    border-color: var(--accent);
  }

  textarea::placeholder {
    color: var(--text-dim);
  }

  .error {
    font-size: 0.72rem;
    color: var(--accent2);
    min-height: 18px;
  }

  .divider {
    width: 100%;
    max-width: 960px;
    height: 1px;
    background: var(--border);
    margin: 28px 0;
  }

  #plot-container {
    width: 100%;
    max-width: 960px;
    background: var(--panel);
    border: 1px solid var(--border);
    min-height: 520px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.3s;
  }

  #plot-container.has-plot {
    border-color: #1e2330;
  }

  #plot {
    width: 100%;
    height: 560px;
  }

  .placeholder-text {
    color: var(--text-dim);
    font-size: 0.75rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .stats-bar {
    width: 100%;
    max-width: 960px;
    display: none;
    gap: 0;
    border: 1px solid var(--border);
    border-top: none;
  }

  .stats-bar.visible { display: flex; }

  .stat {
    flex: 1;
    padding: 10px 16px;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat:last-child { border-right: none; }

  .stat-label {
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .stat-value {
    font-size: 0.85rem;
    font-weight: 600;
    color: #1e2330;
  }

  .stat-value.pos { color: #ef4444; }
  .stat-value.neg { color: #2563eb; }
</style>
</head>
<body>

<header>
  <h1>Bed Mesh Visualizer</h1>
  <span>G29 T · 3D Surface</span>
</header>

<div class="input-section">
  <div class="label-row">
    <label>Paste G29 T output</label>
    <div class="btn-row">
      <button onclick="loadSample()">Load sample</button>
      <button class="primary" onclick="render()">Render →</button>
    </div>
  </div>
  <textarea id="input" placeholder="Paste your Bed Topography Report here..."></textarea>
  <div class="error" id="error"></div>
</div>

<div class="divider"></div>

<div id="plot-container">
  <span class="placeholder-text">Visualization will appear here</span>
  <div id="plot" style="display:none"></div>
</div>

<div class="stats-bar" id="stats-bar">
  <div class="stat">
    <span class="stat-label">Min Z</span>
    <span class="stat-value neg" id="stat-min">—</span>
  </div>
  <div class="stat">
    <span class="stat-label">Max Z</span>
    <span class="stat-value pos" id="stat-max">—</span>
  </div>
  <div class="stat">
    <span class="stat-label">Range</span>
    <span class="stat-value" id="stat-range">—</span>
  </div>
  <div class="stat">
    <span class="stat-label">Grid</span>
    <span class="stat-value" id="stat-grid">—</span>
  </div>
  <div class="stat">
    <span class="stat-label">Bed size</span>
    <span class="stat-value" id="stat-size">—</span>
  </div>
</div>

function loadSample() {
  document.getElementById('input').value = SAMPLE;
  render();
}

function setError(msg) {
  document.getElementById('error').textContent = msg;
}

function parseMesh(text) {
  setError('');

  const coordPattern = /\(\s*(\d+),\s*(\d+)\)/g;
  const coords = [...text.matchAll(coordPattern)].map(m => [+m[1], +m[2]]);
  if (coords.length < 4) throw new Error('Could not find corner coordinates.');

  const xMin = coords[0][0], yMax = coords[0][1];
  const xMax = coords[1][0];
  const yMin = coords[2][1];

  const rowPattern = /^\s*(\d+)\s*\|(.+)$/gm;
  const rows = {};
  for (const m of text.matchAll(rowPattern)) {
    const idx = +m[1];
    const raw = m[2].replace(/[\[\]]/g, '');
    const vals = [...raw.matchAll(/[+-]?\d+\.\d+/g)].map(v => +v[0]);
    if (vals.length) rows[idx] = vals;
  }

  const sortedKeys = Object.keys(rows).map(Number).sort((a, b) => a - b);
  if (!sortedKeys.length) throw new Error('No data rows found.');

  const grid = sortedKeys.map(k => rows[k]); // [y][x], y=0 at front
  return { grid, xMin, xMax, yMin, yMax };
}

function render() {
  const text = document.getElementById('input').value.trim();
  if (!text) { setError('Paste a G29 T report first.'); return; }

  let parsed;
  try { parsed = parseMesh(text); }
  catch (e) { setError(e.message); return; }

  const { grid, xMin, xMax, yMin, yMax } = parsed;
  const nY = grid.length;
  const nX = grid[0].length;

  const xs = Array.from({length: nX}, (_, i) => xMin + (xMax - xMin) * i / (nX - 1));
  const ys = Array.from({length: nY}, (_, i) => yMin + (yMax - yMin) * i / (nY - 1));

  const zMin = Math.min(...grid.flat());
  const zMax = Math.max(...grid.flat());
  const zRange = zMax - zMin;

  // Build hover text
  const hovertext = grid.map((row, iy) =>
    row.map((z, ix) =>
      `X: ${xs[ix].toFixed(0)} mm<br>Y: ${ys[iy].toFixed(0)} mm<br>Z: ${z >= 0 ? '+' : ''}${z.toFixed(3)} mm`
    )
  );

  const surface = {
    type: 'surface',
    x: xs,
    y: ys,
    z: grid,
    hoverinfo: 'text',
    hovertext,
    colorbar: {
      title: { text: 'Z offset (mm)', font: { color: '#1e2330', size: 11 } },
      tickfont: { color: '#1e2330', size: 10 },
      thickness: 14,
      len: 0.6,
    },
    contours: {
      z: { show: true, usecolormap: true, highlightcolor: '#00ff00', project: { z: false } }
    },
    lighting: { ambient: 0.7, diffuse: 0.6, specular: 0.3, roughness: 0.5 },
  };

  const xySpan = Math.max(xMax - xMin, yMax - yMin);
  const layout = {
    font: { family: 'JetBrains Mono, monospace', color: '#1e2330' },
    margin: { l: 0, r: 0, t: 20, b: 0 },
    scene: {
      bgcolor: '#f4f5f7',
      xaxis: {
        title: { text: 'X (mm)', font: { size: 11 } },
        gridcolor: '#dde1e9', zerolinecolor: '#b0b8cc',
        tickfont: { size: 9 },
      },
      yaxis: {
        title: { text: 'Y (mm)', font: { size: 11 } },
        gridcolor: '#dde1e9', zerolinecolor: '#b0b8cc',
        tickfont: { size: 9 },
      },
      zaxis: {
        title: { text: 'Z offset (mm)', font: { size: 11 } },
        gridcolor: '#dde1e9', zerolinecolor: '#2563eb',
        tickfont: { size: 9 },
      },
      aspectmode: 'manual',
      aspectratio: {
        x: (xMax - xMin) / xySpan,
        y: (yMax - yMin) / xySpan,
        z: (zRange / xySpan) * 100,
      },
      camera: { eye: { x: -0.024, y: -1.37, z: 0.67 } },
      // if you want different camera, paste this to browser console:
      // document.querySelector('.js-plotly-plot')._fullLayout.scene._scene.getCamera()
    },
  };

  const plotEl = document.getElementById('plot');
  const container = document.getElementById('plot-container');
  const placeholder = container.querySelector('.placeholder-text');

  plotEl.style.display = 'block';
  if (placeholder) placeholder.style.display = 'none';
  container.classList.add('has-plot');

  Plotly.react('plot', [surface], layout, { responsive: true, displaylogo: false });

  // Stats bar
  document.getElementById('stat-min').textContent = (zMin >= 0 ? '+' : '') + zMin.toFixed(3) + ' mm';
  document.getElementById('stat-max').textContent = (zMax >= 0 ? '+' : '') + zMax.toFixed(3) + ' mm';
  document.getElementById('stat-range').textContent = zRange.toFixed(3) + ' mm';
  document.getElementById('stat-grid').textContent = `${nX} × ${nY}`;
  document.getElementById('stat-size').textContent = `${xMax - xMin} × ${yMax - yMin} mm`;
  document.getElementById('stats-bar').classList.add('visible');
}

document.getElementById('input').addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') render();
});
</script>
